# Example gate config shape. The current deterministic engine has built-in
# defaults; this template documents stable requirement IDs for future overrides.
gate:
  schema_version: manuscript-lab.gate-config.v1
  id: section-ready
  version: 1
  scope: section
  applies_to:
    include:
      - draft/*.md
  profiles:
    default:
      requires:
        - id: contract.valid
          severity: block
          sensor: section_contract
        - id: contract.status_started
          severity: block
          sensor: section_contract
        - id: words.floor
          severity: block
          sensor: section_content
        - id: runtime.fresh
          severity: block
          sensor: runtime_packet
        - id: doccheck.static_pass
          severity: block
          sensor: doccheck_static
        - id: issues.no_blockers
          severity: block
          sensor: issue_ledger
      warns:
        - id: words.near_target
          severity: warn
          sensor: section_content
        - id: reviews.latest_clean
          severity: warn
          sensor: review_errors
  overrides:
    allowed: true
    require_actor: true
    require_reason: true
    max_age_days: 14
