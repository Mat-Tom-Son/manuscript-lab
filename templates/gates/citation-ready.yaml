# Example gate config shape. The current deterministic engine has built-in
# defaults; this template documents stable requirement IDs for future overrides.
gate:
  schema_version: manuscript-lab.gate-config.v1
  id: citation-ready
  version: 1
  scope: citation
  applies_to:
    include:
      - manuscript
      - draft/*.md
  profiles:
    default:
      requires:
        - id: claims.no_empty_placeholders
          severity: block
          sensor: citation_scan
        - id: claims.no_unsupported_markers
          severity: block
          sensor: claims_register
        - id: claims.source_keys_exist
          severity: block
          sensor: claims_register
        - id: sources.index_valid
          severity: block
          sensor: source_index
        - id: sources.no_missing_files
          severity: block
          sensor: source_index
  overrides:
    allowed: true
    require_actor: true
    require_reason: true
    max_age_days: 14
