# Example gate config shape. The current deterministic engine has built-in
# defaults; this template documents stable requirement IDs for future overrides.
gate:
  schema_version: manuscript-lab.gate-config.v1
  id: citation-ready
  version: 1
  scope: citation
  applies_to:
    include:
      - manuscript
      - draft/*.md
  profiles:
    default:
      requires:
        - id: evidence.claims.no_blocking_claims
          severity: block
          sensor: evidence_spine
        - id: evidence.claims.risk_classified
          severity: block
          sensor: evidence_spine
        - id: evidence.claims.support_precise
          severity: block
          sensor: evidence_spine
        - id: evidence.claims.not_needed_explained
          severity: block
          sensor: evidence_spine
        - id: evidence.claims.compatible_markdown_status
          severity: block
          sensor: evidence_spine
        - id: evidence.citations.no_placeholders
          severity: block
          sensor: evidence_spine
        - id: evidence.citations.resolve_markers
          severity: block
          sensor: evidence_spine
        - id: evidence.sources.cited_usable
          severity: block
          sensor: evidence_spine
        - id: evidence.sources.bibliography_present
          severity: block
          sensor: evidence_spine
        - id: evidence.sources.manifest_valid
          severity: block
          sensor: evidence_spine
  overrides:
    allowed: true
    require_actor: true
    require_reason: true
    max_age_days: 14
